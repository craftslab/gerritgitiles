services:
  gerrit:
    image: gerritcodereview/gerrit:2.13.14
    ports:
      - "8080:8080"
      - "29418:29418"
    volumes:
      - gerrit-git:/var/gerrit/git
      - gerrit-db:/var/gerrit/db
      - gerrit-index:/var/gerrit/index
      - gerrit-cache:/var/gerrit/cache
      - gerrit-etc:/var/gerrit/etc

  gitiles:
    build:
      context: .
      args:
        GITILES_REF: v1.6.0
    depends_on:
      - gerrit
    ports:
      - "8081:8080"
    volumes:
      - gerrit-git:/var/git:ro

volumes:
  gerrit-git:
  gerrit-db:
  gerrit-index:
  gerrit-cache:
  gerrit-etc:
